name: codeforge-piston

services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: codeforge-piston
    restart: unless-stopped
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec
    environment:
      # Reasonable defaults for local dev; tune if you see OOM/timeout issues
      - PISTON_MAX_CONCURRENT_JOBS=8
      - PISTON_COMPILE_TIMEOUT=10000
      - PISTON_RUN_TIMEOUT=5000
      - PISTON_OUTPUT_MAX_SIZE=1024000
      - PISTON_MAX_PROCESS_COUNT=64
      - PISTON_MAX_OPEN_FILES=2048
      - PISTON_MAX_FILE_SIZE=10000000
    healthcheck:
      # Piston's API is itself a Node process, so node is guaranteed to be
      # present in the image even if curl/wget aren't.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:2000/api/v2/runtimes',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  piston-packages:
